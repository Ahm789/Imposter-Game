<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Game - Host Voting</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="gameOverlay" class="game-overlay hidden">
    <div id="overlayContent" class="overlay-content">
      <h1 id="overlayText">Voting Phase</h1>
      <div id="countdown" class="countdown">5</div>
    </div>
  </div>

  <div class="phone-container">
    <div class="card">


      <div class="title-section">
        <h1>Odd One Out Game</h1>
        <p class="subtitle" id="phaseTitle">Voting Phase - Host View</p>
        <p class="subtitle" id = "userName"></p>
      </div>
      <div class="title-row">
        <h1>Odd One Out Game <button class="bottom-icon" id="chatBtn">💬</button></h1>
      </div>
      

      <div class="button-group">
        <p>Players already voted: <span id="playerCount"></span></p>
      </div>
      <!-- Player voting section -->
      <section id="playerVoting">
        <h2>Cast Your Vote</h2>
        <p>Select who you think is the imposter:</p>
        <p id="yourVoteContainer" style="display: none;">
          Your vote: <span id="yourVote" style="color: red;">None</span>
        </p>
        <p id="left" style="display: none;">
          The player: <span id="playerLeft" style="color: red;"></span> has left the game
        </p>
        <p id="notVoted" style="display: none;">
          <span id="votedPlayers" style="color: red;"></span>
        </p>

        
        <!-- Version 1: Dropdown -->
        <div id="voteDropdownContainer">
            <select id="voteDropdown">
            <option value="">Select a player</option>
            <!-- JS will populate options dynamically -->
            </select>
            <button id="submitVoteBtn" class="main-btn">Submit Your Vote</button>
        </div>

        <!-- Version 2: Buttons (hidden for now) -->
        <div id="voteButtonContainer" style="display:none">
          <p>Select who you think is the imposter:</p>
          <div id="voteList" class="vote-list">
            <!-- Buttons will populate here -->
          </div>
          <button id="submitVoteBtnButtons" class="main-btn">Submit Your Vote</button>
        </div>
        </section>
            <button id="resultsBtn" class="main-btn">Go to results</button>
            <button id="lobbyBtn" class="main-btn" style="display: none;">Back to lobby</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/JS/voting.js"></script>
</body>
</html>
