<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-container">

        <div class="chat-container">
            <div class="top-bar">

            <button class="icon-btn left back-btn-icon" id="backBtn">
                <svg class="back-icon" viewBox="0 0 24 24">
                    <path d="M10 6L4 12L10 18M4 12H20"/>
                </svg>
            </button>

            </div>

            <div class="title-section">
            <h1>Odd One Out Game</h1>
            <p class="subtitle">
                💬 Send a clue about the word.<br>
                🕵️ Don't make it too obvious — the imposter is watching.
            </p>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">

                <!-- Example message from another player -->
                <div class="chat-message other">
                    <div class="player-name"></div>
                    <div class="message-bubble">
                    </div>
                </div>

                <!-- Example message from yourself -->
                <div class="chat-message self">
                    <div class="player-name"></div>
                    <div class="message-bubble">
                    </div>
                </div>

                </div>
                <div class="typing-indicator hidden" id="typingIndicator">
                    <span class="typing-name">Alex</span>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    </div>

            <!-- Chat input area -->
            <div class="chat-input-area">


            <input 
                type="text" 
                id="chatInput" 
                class="chat-input" 
                placeholder="Type a message..."
            >
            <button class="send-btn" id="sendBtn">➤</button>
            </div>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="JS/chat.js"></script>
</body>
</html>
