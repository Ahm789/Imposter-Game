<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Room</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>

  <div class="phone-container">
    <div class="card host-card">

      <!-- Title -->
      <h2 class="section-title">Game Settings</h2>

      <!-- Game Settings Card -->
      <div class="settings-card">
        <h3 class="card-title">General Settings</h3>

        <div class="form-group">
          <label for="genre">Genre</label>
          <select id="genre">
            <option>Random</option>
            <option>General</option>
            <option>Football</option>
            <option>Music</option>
            <option>Movies</option>
            <option>VideoGames</option>
          </select>
        </div>

      <!-- Player Settings Card -->
      <div class="settings-card">
        <h3 class="card-title">Player Settings</h3>

        <div class="form-group">
          <label for="players">Number of Players</label>
          <select id="players">
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
          </select>
        </div>
        <div class="form-group hidden" id="votingGroup">
            <label for="voting">Enable Voting</label>
            <select id="voting">
              <option>Yes</option>
              <option>No</option>
            </select>
        </div>
        <div class="form-group hidden" id="chatGroup">
            <label for="chat">Enable Chat</label>
            <select id="chat">
              <option>Yes</option>
              <option>No</option>
            </select>
        </div>
        <div class="form-group">
          <label for="imposters">Number of Imposters</label>
          <select id="imposters">
            <option>0</option>
            <option>1</option>
            <option>2</option>
          </select>
        </div>
        <div class="form-group">
          <label for="zimposters">Randomly Select No Imposters</label>
          <select id="zimposters">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="form-group">
          <label for="chance">The Chance For No Imposters</label>
          <select id="chance">
            <option>0.1</option>
            <option>0.2</option>
            <option>0.3</option>
            <option>0.4</option>
            <option>0.5</option>
            <option>0.6</option>
            <option>0.7</option>
            <option>0.8</option>
            <option>0.9</option>
          </select>
        </div>

        <div class="form-group">
          <label for="hintToggle">Hint For Imposter</label>
          <select id="hintToggle">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="difficulty">Imposter Difficulty</label>
          <select id="difficulty">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>

      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button id="backBtn" class="main-btn secondary">Back</button>
      </div>

    </div>
  </div>
<script src="JS/settings.js"></script>
</body>
</html>
