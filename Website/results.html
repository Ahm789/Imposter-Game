<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odd One Out - Results</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-container">
    <div class="card">

      <div class="title-section">
        <h1>Odd One Out Game</h1>
        <p class="subtitle">Results</p>
        <p class="subtitle" id="userName"></p>
      </div>

      <!-- =========================
           NON-IMPOSTER: IMPOSTER WINS
      ========================== -->
      <section id="imposterWonPlayers" class="hidden">
        <h2>Imposter Wins</h2>
        <p>
          The imposter was <strong id="imposterName">---</strong>
        </p>
        <p>
          Their hint was: <strong id="imposterHintPlayers">---</strong>
        </p>
        <p class="p-muted">
          You failed to vote them out.
        </p>
      </section>

      <!-- =========================
           IMPOSTER VIEW: IMPOSTER WINS
      ========================== -->
      <section id="imposterWonSelf" class="hidden">
        <h2>You Won 🎉</h2>
        <p>
          The real word was:
        </p>
        <p class="role-text" id="correctWord">---</p>
      </section>

      <!-- =========================
           NON-IMPOSTER: PLAYERS WIN
      ========================== -->
      <section id="playersWon" class="hidden">
        <h2>You Won 🎉</h2>
        <p>
          You successfully voted out the imposter!
        </p>
        <p>
          Their hint was: <strong id="imposterHint">---</strong>
        </p>
        <p class="p-muted">
          Well played.
        </p>
      </section>

      <!-- =========================
           IMPOSTER VIEW: IMPOSTER LOSES
      ========================== -->
      <section id="imposterLost" class="hidden">
        <h2>You Lost</h2>
        <p>
          You were caught.
        </p>
        <p>
          The word was:
        </p>
        <p class="role-text" id="correctWord">---</p>
      </section>

      <!-- =========================
           HOST CONTROLS
      ========================== -->
      <div class="button-group3">
        <button class="main-btn" id="restartBtn">Start Again</button>
        <button id="settingsBtn" class="main-btn secondary">Change Settings</button>
        <button id="homeBtn" class="main-btn secondary">Home</button>
      </div>

    </div>
  </div>

</body>
</html>
