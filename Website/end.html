<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Finished</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-container">
    <div class="card host-card">

      <div class="title-section">
        <h1>Round Complete</h1>
        <p class="subtitle">Ready to play again? Tap start again to restart!</p>
      </div>

      <!-- Start button -->
      <div class="button-group2">
        <button class="main-btn" id="restartBtn">Start Again</button>
        <button id="settingsBtn" class="main-btn secondary">Change Settings</button>
        <button id="homeBtn" class="main-btn secondary">Home</button>
      </div>

    </div>
  </div>

  <script src="./JS/end.js"></script>
</body>
</html>
