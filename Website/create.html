<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-container">
    <div class="card">

      <div class="title-section">
        <h1>Odd One out Game</h1>
        <p class="subtitle">Find the imposter.</p>
      </div>

      <div class="button-group">
        <input type="text" id="nameInput" placeholder="Enter your name" class="name-input" />
        <button id="hostBtn" class="main-btn secondary">Create Game</button>
        <button id="backBtn" class="main-btn secondary">Back</button>
      </div>

    </div>
  </div>

  <script src="JS/create.js"></script>
</body>
</html>
