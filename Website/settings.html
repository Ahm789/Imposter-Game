<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Room</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>

  <div class="phone-container">
    <div class="card host-card">

      <!-- Title -->
      <h2 class="section-title">Game Settings</h2>

      <!-- Game Settings Card -->
      <div class="settings-card">
        <h3 class="card-title">General Settings</h3>

        <div class="form-group">
          <label for="genre">Genre</label>
          <select id="genre">
            <option>Random</option>
            <option>General</option>
            <option>Football</option>
            <option>Music</option>
            <option>Movies</option>
            <option>VideoGames</option>
          </select>
        </div>

      <!-- Player Settings Card -->
      <div class="settings-card">
        <h3 class="card-title">Player Settings</h3>

        <div class="form-group">
          <label for="players">Number of Players</label>
          <select id="players">
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
          </select>
        </div>
        <div class="form-group hidden" id="votingGroup">
            <label for="voting">Enable Voting</label>
            <select id="voting">
              <option>Yes</option>
              <option>No</option>
            </select>
        </div>
        <div class="form-group hidden" id="chatGroup">
            <label for="chat">Enable Chat</label>
            <select id="chat">
              <option>Yes</option>
              <option>No</option>
            </select>
        </div>
        <div class="form-group">
          <label for="imposters">Number of Imposters</label>
          <select id="imposters">
            <option>0</option>
            <option>1</option>
            <option>2</option>
          </select>
        </div>
        <div class="form-group">
          <label for="zimposters">Randomly Select No Imposters</label>
          <select id="zimposters">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="form-group">
          <label for="chance">The Chance For No Imposters</label>
          <select id="chance">
            <option>0.1</option>
            <option>0.2</option>
            <option>0.3</option>
            <option>0.4</option>
            <option>0.5</option>
            <option>0.6</option>
            <option>0.7</option>
            <option>0.8</option>
            <option>0.9</option>
          </select>
        </div>

        <div class="form-group">
          <label for="hintToggle">Hint For Imposter</label>
          <select id="hintToggle">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="difficulty">Imposter Difficulty</label>
          <select id="difficulty">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
        </div>

      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button id="backBtn" class="main-btn secondary">Back</button>
      </div>

    </div>
  </div>

<script>
    window.addEventListener("load", () => {
    const hintToggle = document.getElementById("hintToggle");
    const difficulty = document.getElementById("difficulty");
    const noImposters = document.getElementById("zimposters");
    const chance = document.getElementById("chance");
    const voting = document.getElementById("voting");

    // Function to update difficulty state
    function updateDifficultyState() {
        if (hintToggle.value === "No") {
        difficulty.classList.add("disabled-select");
        difficulty.disabled = true; // prevents interaction
        } else {
        difficulty.classList.remove("disabled-select");
        difficulty.disabled = false;
        }
    }
    function imposterchance(){
      if (noImposters.value === "No"){
          chance.classList.add("disabled-select");
          chance.disabled = true;
        }
        else {
        chance.classList.remove("disabled-select");
        chance.disabled = false;
        }
    }
    function onloadSettings() {
      if(localStorage.getItem("onlineMode") === "true") {
          document.getElementById("players").classList.add("hidden");
          document.querySelector("label[for='players']").classList.add("hidden");
          document.getElementById("votingGroup").classList.remove("hidden");
          document.getElementById("chatGroup").classList.remove("hidden");
      }
      else{
          document.getElementById("players").classList.remove("hidden");
          document.querySelector("label[for='players']").classList.remove("hidden");
          document.getElementById("votingGroup").classList.add("hidden");
          document.getElementById("chatGroup").classList.add("hidden");
      }
    }
    function updateVotingChat() {
        if (voting.value === "No") {
            document.getElementById("chatGroup").classList.add("hidden");
        } else {
            document.getElementById("chatGroup").classList.remove("hidden");
        }
    }
    if(localStorage.getItem("voting") === "No") {
        document.getElementById("chatGroup").classList.remove("hidden");
        localStorage.setItem("chat", "No");
    }
    // Initial check on load
    onloadSettings();
    updateVotingChat();
    updateDifficultyState();
    imposterchance();

    // Listen for changes
    hintToggle.addEventListener("change", () => {
        updateDifficultyState();
    });
    voting.addEventListener("change", () => {
        updateVotingChat();
    });
    noImposters.addEventListener("change", () => {
        imposterchance();
    });

    // Load saved settings from localStorage
    document.getElementById("players").value = localStorage.getItem("players") || "3";
    document.getElementById("imposters").value = localStorage.getItem("imposters") || "1";
    document.getElementById("zimposters").value = localStorage.getItem("zimposters") || "No";
    document.getElementById("chance").value = localStorage.getItem("chance") || "0.2";
    document.getElementById("difficulty").value = localStorage.getItem("difficulty") || "Medium";
    document.getElementById("hintToggle").value = localStorage.getItem("hintToggle") || "Yes";
    document.getElementById("voting").value = localStorage.getItem("voting") || "No";
    document.getElementById("genre").value = localStorage.getItem("genre") || "Random";
    document.getElementById("chat").value = localStorage.getItem("chat") || "No";

    // Make sure state is correct after loading saved value
    updateDifficultyState();
      onloadSettings();
      updateVotingChat();
      imposterchance();
    });


    // When clicking back/start game, save settings
        document.getElementById("backBtn").addEventListener("click", () => {
        // Save settings
        localStorage.setItem("voting", document.getElementById("voting").value);
        localStorage.setItem("players", document.getElementById("players").value);
        localStorage.setItem("imposters", document.getElementById("imposters").value);
        localStorage.setItem("zimposters", document.getElementById("zimposters").value);
        localStorage.setItem("chance", document.getElementById("chance").value);
        localStorage.setItem("difficulty", document.getElementById("difficulty").value);
        localStorage.setItem("hintToggle", document.getElementById("hintToggle").value);
        localStorage.setItem("genre", document.getElementById("genre").value);
        localStorage.setItem("chat", document.getElementById("chat").value);

        // Determine which page to go back to
        const prevPage = localStorage.getItem("previousPage") || "game.html";
        window.location.href = prevPage;
    });

</script>


</body>
</html>
